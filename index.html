<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#04060e">
<title>Naomi量子战纪星路榜 · NAOMI QUANTUM STAR ROAD RANKING</title>
<!--
═══════════════════════════════════════════════════════════════════
  Naomi量子战纪星路榜 rank_board.html v6 — 单文件 H5 榜单页（线上模式对接 Cloudflare Worker）
  设计: 赛博霓虹 · 量子青 #00f0ff × 霓虹粉 #ff2a8d · 游戏美术资源底图

  【v6 重做要点】
  ① 美术资源全本地化：头像/前三奖牌/英雄区底图全部改用同仓库相对路径
     avatars/*.webp（GitHub Pages 同目录托管，永不过期；img onError 回退首字色块保留）
  ② RANK 段位徽章：玩家卡片 meta 行 + 详情格显示游戏内 Rank 段位
     （payload.playerLevel/playerRank → getRankForLevel 映射表，格式「LV.85 全次元之王」；
     旧数据无此字段优雅降级不显示）——替代旧「榜内名次」格
  ③ 称号显示沿用 v5（payload.title 字符串 id 或对象均可；旧数据无 title 不占位）
  ④ mock 彻底清零：页面无任何 mock 生成入口；Worker 新增 /admin/clear 管理端点
     清 KV 早期测试残留（见 worker.js 头注与 DEPLOY.md）

  【v5 要点（沿用）】
  ① 纯真实数据：mock 生成器/演示码入口全删；无数据显示「虚位以待」引导
  ② 世界大战 v3：昨日快照全员参赛（≥5 人开启，不足显示「满5人明日开战」），
     每轮随机两两配对单败淘汰（奇数轮空）；每场 = 3v3 逐角色对位对拼
     （角色战力 ×(0.75+种子随机0.5) ×元素系数：克制1.30/逆克0.85/同元素共鸣1.05，
     三局两胜，空位不战而败，拖平总战力决胜局）；存活到最后 = 冠军；
     完整逐回合战斗记录（点玩家卡片展开其全部对战记录 + 完整赛程）；
     「击败数」（淘汰的玩家数）替代旧胜场数
  ③ 昨日榜 tab：每日 0 点（UTC+8）Worker 快照结算封存，昨日数据不变，
     今日上传不影响昨日榜；昨日前 3 名发奖；实时榜无奖励提示「奖励以昨日结算为准」
  ④ 奖励码回传大按钮：每日礼包区 + 昨日榜奖励区 + 大战冠军区，
     统一「复制奖励码回游戏」一键复制，回游戏自动识别领奖
  ⑤ 称号显示：payload.title（字符串 id 或对象均可），移植游戏称号特效 CSS
     （glow/shimmer/neon/flame/void/rainbow/divine/chaos/glitch/starlight + 高级称号流光贯穿）

  【部署配置】只需改下方「模块1 · 配置」API_BASE：
    已预填 https://nq-rank-worker.348438906.workers.dev（线上模式）；
    清空字符串 '' → 回退本地模式（仅本机数据，全离线可用）

  【与游戏端协议（逐字节一致，见 react-vite/src/data/rankData.js & cdkData.js）】
  ① 上榜码: NQCRANK-{base64url(JSON)}-{sig16}
     sig16 = HMAC-SHA256(CDK_SECRET, 'NQCRANK' + payload) 前16位hex大写
     payload(v=1): { v, slotId, name, power, party:[{charId,name,level,stars,power}×3],
       megaCount, maxEnhance, credits, gems, rank, portraitCount,
       abyssFloor, caixiaoniao, worldWarWins, ts, title?, playerLevel?, playerRank? }
  ② 每日礼包码: NQC-RANK_D1 / RANK_D3 / RANK_D10 / RANK_N-{8hex}-{sig16}
     负载 = '00' + ts6hex（encodeRankUploadTs 分钟精度，锚 2026-01-01 UTC）
  ③ 昨日榜奖励码: 同②（昨日第1→RANK_D1，昨日前3→RANK_D3；ts 锚结算时刻）
  ④ 世界大战奖励码: NQC-RANK_WW-{击败数2hex + ts6hex}-{sig16}

  【领奖新鲜度规则】每个存档每次上传只能领一次（payload.ts 为锚）；
  昨日榜/大战奖励码 ts 锚 = max(最近上传ts+1分钟, 结算日23:59 UTC+8)，
  保证与每日礼包码 ts 链不冲突（建议玩家先领昨日奖再上传今日码）。
═══════════════════════════════════════════════════════════════════
-->
<style>
/* ─────────── 主题变量 ─────────── */
:root{
  --cyan:#00f0ff; --pink:#ff2a8d; --bg:#04060e; --bg2:#0a0e1d;
  --panel:rgba(12,17,36,.88); --line:rgba(0,240,255,.16);
  --txt:#d7e6ff; --dim:#7a8bb0;
  --gold:#ffd700; --silver:#c9d6e8; --bronze:#e08a4e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  overflow:hidden;
}
/* 赛博网格底纹 */
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,240,255,.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,240,255,.04) 1px,transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(180deg,rgba(0,0,0,.7),rgba(0,0,0,.15));
  -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.7),rgba(0,0,0,.15));}
#app{position:relative;z-index:1;height:100dvh;max-width:560px;margin:0 auto;
  display:flex;flex-direction:column;padding:0 12px;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* ─────────── 首屏英雄区（美术底图 + 暗角渐变） ─────────── */
.hero{flex:none;position:relative;margin:0 -12px;padding:14px 14px 12px;overflow:hidden}
.hero-art{position:absolute;inset:0;background-size:cover;background-position:center 22%;
  filter:saturate(1.15);transform:scale(1.02)}
.hero-veil{position:absolute;inset:0;
  background:
    radial-gradient(130% 95% at 50% -8%,transparent 26%,rgba(4,6,14,.62) 66%,var(--bg) 100%),
    linear-gradient(180deg,rgba(4,6,14,.34) 0%,rgba(4,6,14,.26) 42%,rgba(4,6,14,.96) 100%),
    radial-gradient(65% 55% at 10% 6%,rgba(0,240,255,.20),transparent 62%),
    radial-gradient(60% 50% at 94% 16%,rgba(255,42,141,.20),transparent 62%)}
.hero-inner{position:relative}
.hero-top{display:flex;align-items:flex-start;gap:10px}
.hero-title{flex:1;min-width:0}
.hero-title h1{font-size:23px;letter-spacing:3px;font-weight:900;line-height:1.15;
  background:linear-gradient(92deg,var(--cyan) 15%,#9fd8ff 45%,var(--pink) 85%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 16px rgba(0,240,255,.5))}
.hero-title .sub{margin-top:3px;font-size:9px;letter-spacing:2.5px;color:#9db4dd;opacity:.9}
.hero-title .live{display:inline-flex;align-items:center;margin-top:6px;font-size:9px;color:var(--cyan);
  border:1px solid var(--line);border-radius:99px;padding:2px 9px;letter-spacing:1.5px;
  background:rgba(4,6,14,.5);box-shadow:0 0 10px rgba(0,240,255,.15) inset}
.hero-title .live i{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--cyan);
  margin-right:5px;box-shadow:0 0 8px var(--cyan);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.25}}
/* 语言切换 */
.langs{flex:none;display:flex;gap:4px;background:rgba(4,6,14,.55);border:1px solid var(--line);
  border-radius:99px;padding:3px}
.langs button{border:none;background:transparent;color:var(--dim);font-size:10px;font-weight:700;
  padding:4px 8px;border-radius:99px;cursor:pointer;letter-spacing:1px;transition:.2s}
.langs button.on{background:linear-gradient(135deg,var(--cyan),#4df);color:#021014;
  box-shadow:0 0 10px rgba(0,240,255,.5)}

/* 我的卡片（英雄区内） */
.me{margin-top:10px;display:flex;align-items:center;gap:11px;
  background:linear-gradient(120deg,rgba(255,42,141,.16),rgba(0,240,255,.10) 60%),rgba(8,12,26,.82);
  border:1px solid rgba(255,42,141,.45);border-radius:14px;padding:10px 12px;
  backdrop-filter:blur(8px);position:relative;overflow:hidden;
  animation:mepulse 2.4s ease-in-out infinite}
@keyframes mepulse{0%,100%{box-shadow:0 0 12px rgba(255,42,141,.30)}50%{box-shadow:0 0 26px rgba(255,42,141,.6)}}
.me::before{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);
  transform:skewX(-18deg);animation:meshine 3.2s infinite}
@keyframes meshine{0%{left:-70%}55%,100%{left:140%}}
.me .medal{flex:none;width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-weight:900;
  background:rgba(0,240,255,.08);border:1px solid var(--line);color:var(--cyan)}
.me .medal .r{font-size:17px;line-height:1}
.me .medal .k{font-size:7px;letter-spacing:1px;color:var(--dim);margin-top:2px}
.me .meinfo{flex:1;min-width:0}
.me .menm{font-size:14px;font-weight:800;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me .memeta{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:.5px}
.me .memeta b{color:var(--cyan);font-weight:700}
.me .mestate{flex:none;font-size:9px;letter-spacing:1px;padding:4px 9px;border-radius:99px;border:1px solid}
.mestate.can{color:#3dffa8;border-color:rgba(61,255,168,.5);text-shadow:0 0 8px rgba(61,255,168,.6)}
.mestate.done{color:var(--dim);border-color:rgba(122,139,176,.35)}
.me.empty{justify-content:center;text-align:center;color:var(--dim);font-size:11px;letter-spacing:1px;
  border-style:dashed;animation:none;line-height:1.7}

/* 上榜码输入行（英雄区底部） */
.code-row{display:flex;gap:8px;margin-top:10px}
.code-row input{flex:1;min-width:0;background:rgba(3,5,12,.72);border:1px solid var(--line);
  border-radius:11px;color:var(--cyan);padding:10px 12px;font-size:11px;outline:none;
  font-family:ui-monospace,Menlo,monospace;transition:.2s;backdrop-filter:blur(6px)}
.code-row input:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.3)}
.code-row input::placeholder{color:#43507a;font-family:inherit}
.btn{border:none;border-radius:11px;padding:0 15px;font-size:12px;font-weight:800;
  letter-spacing:2px;color:#021014;cursor:pointer;white-space:nowrap;
  background:linear-gradient(135deg,var(--cyan),#4df);
  box-shadow:0 0 14px rgba(0,240,255,.4);transition:.15s}
.btn:active{transform:scale(.95)}
.btn.pink{background:linear-gradient(135deg,var(--pink),#ff7ab8);color:#1a0210;
  box-shadow:0 0 14px rgba(255,42,141,.45)}
.btn.ghost{background:transparent;color:var(--cyan);border:1px solid var(--line);box-shadow:none}
.btn[disabled]{opacity:.4;pointer-events:none}
/* 回传大按钮（复制奖励码回游戏 · 一眼可见） */
.btn-xl{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  width:100%;min-height:52px;padding:10px 14px;border:none;border-radius:13px;cursor:pointer;
  background:linear-gradient(135deg,var(--pink),#ff7ab8);color:#1a0210;
  box-shadow:0 0 22px rgba(255,42,141,.55),0 4px 14px rgba(0,0,0,.4);
  font-weight:900;letter-spacing:2px;font-size:14px;transition:.15s;position:relative;overflow:hidden;
  animation:xlpulse 2.2s ease-in-out infinite}
.btn-xl::before{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.22),transparent);
  transform:skewX(-18deg);animation:meshine 2.6s infinite}
@keyframes xlpulse{0%,100%{box-shadow:0 0 14px rgba(255,42,141,.45)}50%{box-shadow:0 0 30px rgba(255,42,141,.8)}}
.btn-xl:active{transform:scale(.97)}
.btn-xl .xl-sub{font-size:9px;font-weight:600;letter-spacing:1.5px;opacity:.85}
.codemsg{margin-top:6px;font-size:11px;min-height:14px;letter-spacing:.5px;position:relative}
.codemsg.ok{color:#3dffa8;text-shadow:0 0 8px rgba(61,255,168,.6)}
.codemsg.err{color:#ff5d7a;text-shadow:0 0 8px rgba(255,93,122,.6)}

/* ─────────── 分榜 Tab ─────────── */
.tabs{flex:none;display:flex;gap:7px;margin-top:12px}
.tabs button{flex:1;background:rgba(10,14,29,.82);border:1px solid var(--line);color:var(--dim);
  border-radius:12px;padding:9px 0 8px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:.2s;font-weight:600}
.tabs button.on{color:var(--cyan);border-color:var(--cyan);
  box-shadow:0 0 16px rgba(0,240,255,.28),inset 0 0 12px rgba(0,240,255,.08);font-weight:800}
.tabs button small{display:block;font-size:8px;letter-spacing:1px;margin-top:2px;opacity:.7;font-weight:400}

/* ─────────── 榜单磁吸滚动区 ─────────── */
.board{flex:1;min-height:0;margin-top:10px;overflow-y:auto;border-radius:12px;
  scroll-snap-type:y proximity;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--cyan) transparent;padding-bottom:76px}
.board::-webkit-scrollbar{width:4px}
.board::-webkit-scrollbar-thumb{background:rgba(0,240,255,.35);border-radius:4px}
/* 榜单卡片：头像左 + 名字称号中 + 战力右 + 击败数小标 */
.card{scroll-snap-align:start;display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid rgba(0,240,255,.10);border-radius:14px;
  padding:10px 12px;margin-bottom:9px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card:active{transform:scale(.985)}
.card .rank-badge{flex:none;width:34px;height:38px;border-radius:11px;display:flex;
  align-items:center;justify-content:center;font-weight:900;font-size:14px;
  background:rgba(255,255,255,.05);color:var(--dim);border:1px solid rgba(255,255,255,.08)}
/* 前三 金/银/铜 奖牌图（同仓库 avatars/rank_1/2/3.webp；加载失败自动回退渐变底） */
.card.top1 .rank-badge,.card.top2 .rank-badge,.card.top3 .rank-badge{
  color:transparent;border:none;background-color:transparent;
  background-position:center;background-repeat:no-repeat;background-size:135%;
  filter:drop-shadow(0 0 10px rgba(255,215,0,.45));transform:scale(1.18)}
.card.top1 .rank-badge{background-image:url('avatars/rank_1.webp'),
  radial-gradient(circle at 35% 30%,#fff3b0,var(--gold) 55%,#b8860b)}
.card.top2 .rank-badge{background-image:url('avatars/rank_2.webp'),
  radial-gradient(circle at 35% 30%,#fff,var(--silver) 55%,#7c8aa0);filter:drop-shadow(0 0 8px rgba(201,214,232,.5));transform:scale(1.14)}
.card.top3 .rank-badge{background-image:url('avatars/rank_3.webp'),
  radial-gradient(circle at 35% 30%,#ffd7b0,var(--bronze) 55%,#8a4a1f);filter:drop-shadow(0 0 8px rgba(224,138,78,.5));transform:scale(1.14)}
.card.top10{border-color:rgba(0,240,255,.45);box-shadow:0 0 12px rgba(0,240,255,.18),inset 0 0 18px rgba(0,240,255,.05)}
.card.top1{border-color:rgba(255,215,0,.55);box-shadow:0 0 16px rgba(255,215,0,.25)}
/* 卡片头像（主队第 1 角色） */
.cav{flex:none;width:46px;height:46px;border-radius:12px;overflow:hidden;position:relative;
  border:1px solid rgba(0,240,255,.3);box-shadow:0 0 10px rgba(0,240,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#021014}
.cav img{width:100%;height:100%;object-fit:cover;display:block}
.card .info{flex:1;min-width:0}
.card .nm{font-size:14px;font-weight:800;letter-spacing:.6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .nm .idtag{font-size:9px;color:var(--pink);font-weight:400}
.card .ctitle{margin-top:2px;font-size:9px;line-height:1.4;min-height:0}
.card .meta{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:.5px}
.card .meta b{color:var(--cyan);font-weight:600}
.card .pw{flex:none;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card .pw .v{font-size:19px;font-weight:900;letter-spacing:.5px;font-family:ui-monospace,Menlo,monospace}
.card .pw .lb{font-size:8px;color:var(--dim);letter-spacing:1.5px}
/* 击败数小标 */
.kchip{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:800;letter-spacing:.5px;
  color:#ffb3d1;background:rgba(255,42,141,.12);border:1px solid rgba(255,42,141,.4);
  border-radius:99px;padding:2px 7px;font-family:ui-monospace,Menlo,monospace}
.kchip svg{flex:none}
/* RANK 段位徽章（游戏 getRankForLevel 同口径：LV.{playerLevel} {段位名}，颜色随段位） */
.rbadge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;letter-spacing:.5px;
  color:var(--rc,#9ca3af);border:1px solid var(--rc,#9ca3af);border-radius:6px;padding:1px 6px;
  background:rgba(0,0,0,.32);text-shadow:0 0 8px var(--rc,#9ca3af);white-space:nowrap;vertical-align:1px}
.rbadge::before{content:"";flex:none;width:5px;height:5px;background:var(--rc,#9ca3af);
  transform:rotate(45deg);box-shadow:0 0 6px var(--rc,#9ca3af)}
.rbadge .rlv{font-family:ui-monospace,Menlo,monospace;opacity:.85}
.rbadge.top{animation:rglow 2s ease-in-out infinite}
@keyframes rglow{50%{box-shadow:0 0 12px var(--rc,#ffd700)}}
.me .rbadge{margin-left:6px}
/* 战力 9 档配色（powerData.js QUANTUM_TIERS 移植） */
.pw0{color:#67e8f9}.pw1{color:#22d3ee}.pw2{color:#60a5fa}.pw3{color:#818cf8}
.pw4{color:#a78bfa;text-shadow:0 0 10px rgba(167,139,250,.5)}
.pw5{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.5)}
.pw6{color:#fbbf24;text-shadow:0 0 12px rgba(251,191,36,.55)}
.pw7,.pw8{background:linear-gradient(92deg,#ffd76a,#ff8c1a 45%,#ff4500);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 8px rgba(255,120,20,.6));animation:burn 1.8s ease-in-out infinite}
.pw8{filter:drop-shadow(0 0 12px rgba(255,69,0,.8))}
@keyframes burn{50%{filter:drop-shadow(0 0 16px rgba(255,100,10,.9))}}
/* 我的条目在榜内高亮 */
.card.me-hl{border-color:var(--pink)}
.card.me-hl::before{content:"MY";position:absolute;top:0;right:0;font-size:8px;letter-spacing:1px;
  background:var(--pink);color:#1a0210;padding:2px 8px;border-radius:0 10px 0 8px;font-weight:900;z-index:2}

/* ─────────── 称号特效（移植自游戏 HomeScreen TitleDisplay：流光/星辉渐变等） ─────────── */
.ttl{display:inline-block;position:relative;max-width:100%;border-radius:6px;vertical-align:middle}
.ttl .title-text{font-weight:900;letter-spacing:.12em;position:relative;display:inline-block;
  font-size:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;vertical-align:middle}
.title-effect-glow{color:var(--title-color);text-shadow:0 0 8px var(--title-color),0 0 16px var(--title-color);
  animation:titleGlow 2s ease-in-out infinite}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 8px var(--title-color),0 0 16px var(--title-color);filter:brightness(1)}
  50%{text-shadow:0 0 16px var(--title-color),0 0 32px var(--title-color),0 0 48px var(--title-color);filter:brightness(1.3)}}
.title-effect-glitch{color:var(--title-color);animation:titleGlitch 3s infinite}
.title-effect-glitch::before,.title-effect-glitch::after{
  content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.title-effect-glitch::before{color:#ff0040;animation:glitchBefore 3s infinite;
  clip-path:polygon(0 0,100% 0,100% 45%,0 45%);mix-blend-mode:screen}
.title-effect-glitch::after{color:#00f0ff;animation:glitchAfter 3s infinite;
  clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%);mix-blend-mode:screen}
@keyframes titleGlitch{0%,90%,100%{transform:translate(0)}92%{transform:translate(-2px,1px)}
  94%{transform:translate(2px,-1px)}96%{transform:translate(-1px,-1px)}98%{transform:translate(1px,1px)}}
@keyframes glitchBefore{0%,90%,100%{transform:translate(0);opacity:0}92%{transform:translate(3px,-1px);opacity:.8}
  94%{transform:translate(-2px,1px);opacity:.6}96%{transform:translate(2px,0);opacity:.7}98%{transform:translate(-1px,1px);opacity:0}}
@keyframes glitchAfter{0%,90%,100%{transform:translate(0);opacity:0}92%{transform:translate(-3px,1px);opacity:.8}
  94%{transform:translate(2px,-1px);opacity:.6}96%{transform:translate(-2px,0);opacity:.7}98%{transform:translate(1px,-1px);opacity:0}}
.title-effect-shimmer{color:var(--title-color);
  background:linear-gradient(90deg,var(--title-color) 0%,#ffffff 45%,#ffffff 55%,var(--title-color) 100%);
  background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShimmer 2.5s linear infinite}
@keyframes titleShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.title-effect-neon{color:#fff;animation:titleNeon 1.5s ease-in-out infinite alternate}
@keyframes titleNeon{0%{text-shadow:0 0 4px #fff,0 0 8px var(--title-color),0 0 16px var(--title-color)}
  100%{text-shadow:0 0 8px #fff,0 0 20px var(--title-color),0 0 40px var(--title-color),0 0 60px var(--title-color)}}
.title-effect-flame{color:var(--title-color);animation:titleFlame .8s ease-in-out infinite alternate;
  text-shadow:0 -2px 4px rgba(255,100,0,.8),0 -4px 8px rgba(255,50,0,.6),0 -8px 16px rgba(255,0,0,.4)}
@keyframes titleFlame{0%{text-shadow:0 -2px 4px rgba(255,100,0,.8),0 -4px 8px rgba(255,50,0,.6);transform:scaleY(1)}
  50%{text-shadow:0 -4px 8px rgba(255,150,0,.9),0 -8px 16px rgba(255,50,0,.7),0 -12px 24px rgba(255,0,0,.5);transform:scaleY(1.02)}
  100%{text-shadow:0 -2px 6px rgba(255,80,0,.7),0 -6px 12px rgba(255,30,0,.5);transform:scaleY(.98)}}
.title-effect-rainbow{background:linear-gradient(90deg,#ff2a8d,#f59e0b,#22c55e,#06b6d4,#3b82f6,#a855f7,#ff2a8d);
  background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleRainbow 3s linear infinite}
@keyframes titleRainbow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.title-effect-void{color:var(--title-color);animation:titleVoid 4s ease-in-out infinite}
@keyframes titleVoid{0%,100%{text-shadow:0 0 8px var(--title-color);filter:brightness(1) contrast(1)}
  25%{text-shadow:0 0 20px var(--title-color),4px 0 0 #1a0030,-4px 0 0 #0a0020;filter:brightness(1.5) contrast(1.2)}
  50%{text-shadow:0 0 4px var(--title-color);filter:brightness(.7) contrast(.8)}
  75%{text-shadow:0 0 20px var(--title-color),-3px 0 0 #1a0030,3px 0 0 #0a0020;filter:brightness(1.3) contrast(1.1)}}
.title-effect-divine{color:var(--title-color);animation:titleDivine 3s ease-in-out infinite}
@keyframes titleDivine{0%,100%{text-shadow:0 0 8px var(--title-color),0 0 16px rgba(255,215,0,.5);filter:brightness(1)}
  33%{text-shadow:0 0 20px var(--title-color),0 0 40px rgba(255,215,0,.8),0 0 60px rgba(255,255,255,.3);filter:brightness(1.5)}
  66%{text-shadow:0 0 12px var(--title-color),0 0 24px rgba(255,215,0,.6),0 2px 4px rgba(255,255,255,.4);filter:brightness(1.2)}}
.title-effect-chaos{color:var(--title-color);animation:titleChaos 2s infinite}
.title-effect-chaos::before{content:attr(data-text);position:absolute;top:0;left:0;color:#ff0040;
  animation:chaosBefore 1.5s infinite;mix-blend-mode:screen;opacity:.7}
.title-effect-chaos::after{content:attr(data-text);position:absolute;top:0;left:0;color:#00f0ff;
  animation:chaosAfter 1.8s infinite;mix-blend-mode:screen;opacity:.7}
@keyframes titleChaos{0%,80%,100%{transform:translate(0) scale(1);filter:hue-rotate(0deg)}
  85%{transform:translate(-3px,2px) scale(1.02);filter:hue-rotate(30deg)}
  90%{transform:translate(3px,-1px) scale(.98);filter:hue-rotate(-30deg)}
  95%{transform:translate(-2px,-2px) scale(1.01);filter:hue-rotate(60deg)}}
@keyframes chaosBefore{0%,75%,100%{transform:translate(0)}80%{transform:translate(4px,-2px)}
  85%{transform:translate(-3px,1px)}90%{transform:translate(2px,2px)}}
@keyframes chaosAfter{0%,70%,100%{transform:translate(0)}75%{transform:translate(-4px,2px)}
  80%{transform:translate(3px,-1px)}85%{transform:translate(-2px,-2px)}}
.title-effect-none{color:var(--title-color)}
.title-effect-starlight{color:var(--title-color);
  background:linear-gradient(90deg,var(--title-color) 0%,#fff7d6 40%,#ffffff 50%,#fff7d6 60%,var(--title-color) 100%);
  background-size:220% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShimmer 3.2s linear infinite,titleStarlightGlow 2.4s ease-in-out infinite}
@keyframes titleStarlightGlow{0%,100%{filter:drop-shadow(0 0 3px rgba(255,209,102,.55))}
  50%{filter:drop-shadow(0 0 10px rgba(255,209,102,.95))}}
.title-star-particle{position:absolute;width:3px;height:3px;border-radius:9999px;background:#ffe9a8;
  box-shadow:0 0 5px #ffd166,0 0 9px rgba(255,209,102,.6);pointer-events:none;
  animation:titleStarTwinkle ease-in-out infinite}
@keyframes titleStarTwinkle{0%,100%{opacity:.1;transform:scale(.5)}50%{opacity:1;transform:scale(1.2)}}
/* 高级称号「流光贯穿」：光带周期左右扫过（overlay 零布局占位） */
.title-stream-fx{position:absolute;left:-14%;right:-14%;top:0;bottom:0;overflow:hidden;pointer-events:none;border-radius:10px}
.title-stream-band{position:absolute;top:0;bottom:0;left:0;width:34%;
  -webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 30%,#000 70%,transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0%,#000 30%,#000 70%,transparent 100%);
  mix-blend-mode:screen;transform:translateX(-170%) skewX(-16deg);
  animation:titleStreamSweep 3.4s cubic-bezier(.45,.05,.35,.95) infinite;will-change:transform,opacity}
.title-stream-band-rev{width:22%;animation-name:titleStreamSweepRev}
@keyframes titleStreamSweep{0%{transform:translateX(-170%) skewX(-16deg);opacity:0}12%{opacity:1}
  52%{opacity:1}72%{opacity:0}100%{transform:translateX(500%) skewX(-16deg);opacity:0}}
@keyframes titleStreamSweepRev{0%,34%{transform:translateX(720%) skewX(16deg);opacity:0}44%{opacity:.75}
  78%{opacity:.75}92%{opacity:0}100%{transform:translateX(-240%) skewX(16deg);opacity:0}}
.title-stream-spark{position:absolute;width:2.5px;height:2.5px;border-radius:9999px;pointer-events:none;
  animation:titleStreamSpark ease-in-out infinite}
@keyframes titleStreamSpark{0%,100%{opacity:.08;transform:scale(.5)}50%{opacity:.95;transform:scale(1.15)}}
/* 详情区称号大图 */
.dtitle{text-align:center;padding:2px 0 10px;margin-bottom:10px;border-bottom:1px solid rgba(0,240,255,.10);position:relative}
.dtitle .ttl{font-size:14px;overflow:visible}
.dtitle .tst{margin-top:2px;font-size:8px;color:var(--dim);letter-spacing:1px;font-family:ui-monospace,Menlo,monospace}

/* 展开详情 */
.detail{margin:-4px 0 10px;background:rgba(6,9,20,.94);border:1px solid rgba(0,240,255,.22);
  border-top:none;border-radius:0 0 12px 12px;padding:12px;animation:drop .25s ease}
@keyframes drop{from{opacity:0;transform:translateY(-8px)}}
.chars{display:flex;gap:8px}
.char{flex:1;text-align:center;background:rgba(0,240,255,.05);border:1px solid rgba(0,240,255,.12);
  border-radius:10px;padding:8px 4px}
.char .av{width:50px;height:50px;margin:0 auto 6px;border-radius:10px;overflow:hidden;
  border:1px solid rgba(0,240,255,.3);box-shadow:0 0 10px rgba(0,240,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#021014}
.char .av img{width:100%;height:100%;object-fit:cover;display:block}
.char .cn{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char .cs{font-size:9px;color:var(--gold);letter-spacing:1px;margin-top:2px}
.char .cp{font-size:9px;color:var(--cyan);margin-top:2px;font-family:ui-monospace,Menlo,monospace}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.dgrid .cell{background:rgba(255,42,141,.05);border:1px solid rgba(255,42,141,.12);
  border-radius:8px;padding:6px 4px;text-align:center}
.dgrid .k{font-size:8px;color:var(--dim);letter-spacing:.5px}
.dgrid .v{font-size:11px;font-weight:700;color:var(--txt);margin-top:2px;font-family:ui-monospace,Menlo,monospace}
.dgrid .v.hl{color:var(--pink)}

/* ─────────── 世界大战 / 昨日榜 战报卡 ─────────── */
.ww-report{scroll-snap-align:start;background:linear-gradient(120deg,rgba(255,42,141,.14),rgba(6,9,20,.94));
  border:1px solid rgba(255,42,141,.35);border-radius:12px;padding:12px;margin-bottom:10px}
.ww-report .wt{font-size:11px;letter-spacing:2px;color:var(--pink);font-weight:800;display:flex;align-items:center;gap:7px}
.ww-report .wt::before{content:"";width:7px;height:7px;background:var(--pink);box-shadow:0 0 8px var(--pink);transform:rotate(45deg)}
.ww-report .wt .date{margin-left:auto;font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:400}
.ww-champ{display:flex;align-items:center;gap:10px;margin-top:9px}
.crown-img{width:40px;height:40px;object-fit:contain;flex:none;
  filter:drop-shadow(0 0 10px rgba(255,215,0,.55))}
.ww-champ .who{font-size:13px;font-weight:800}
.ww-champ .sub2{font-size:9px;color:var(--dim);margin-top:2px}
.ww-code{margin-top:10px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--cyan);
  word-break:break-all;background:rgba(0,0,0,.5);border:1px dashed rgba(0,240,255,.4);
  border-radius:8px;padding:8px 10px;letter-spacing:.5px;cursor:pointer}
.ww-hint{margin-top:7px;font-size:9px;color:var(--gold);letter-spacing:1px}
.ww-act{margin-top:10px}
.ww-meta-row{display:flex;gap:8px;margin-top:9px}
.ww-meta-cell{flex:1;background:rgba(0,240,255,.05);border:1px solid rgba(0,240,255,.12);border-radius:9px;
  padding:7px 6px;text-align:center}
.ww-meta-cell .k{font-size:8px;color:var(--dim);letter-spacing:1px}
.ww-meta-cell .v{font-size:13px;font-weight:900;color:var(--cyan);margin-top:2px;font-family:ui-monospace,Menlo,monospace}
/* 未开启 / 结算中 */
.ww-gate{margin-top:9px;text-align:center;padding:14px 10px;border:1px dashed rgba(255,42,141,.4);border-radius:10px}
.ww-gate .g1{font-size:13px;color:var(--pink);letter-spacing:2px;font-weight:800}
.ww-gate .g2{margin-top:5px;font-size:10px;color:var(--dim);line-height:1.8}
.ww-gate .gbar{margin:9px auto 0;width:78%;height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.ww-gate .gbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink),var(--cyan));
  box-shadow:0 0 10px rgba(255,42,141,.6)}
/* 今日预告条 */
.ww-preview{margin-top:10px;font-size:9px;color:var(--dim);letter-spacing:1px;text-align:center;
  border-top:1px solid rgba(255,42,141,.18);padding-top:8px}
.ww-preview b{color:var(--cyan)}

/* 世界大战：参赛者对战记录展开 */
.wlog{margin:-4px 0 10px;background:rgba(6,9,20,.94);border:1px solid rgba(255,42,141,.28);
  border-top:none;border-radius:0 0 12px 12px;padding:11px 12px;animation:drop .25s ease}
.wlog .wl-cap{font-size:9px;letter-spacing:2px;color:var(--pink);font-weight:800;opacity:.9}
.wl-match{margin-top:8px;background:rgba(3,6,14,.55);border:1px solid rgba(0,240,255,.14);border-radius:9px;padding:8px 10px}
.wl-mhead{display:flex;align-items:baseline;gap:7px;font-size:11px;font-weight:700;letter-spacing:.5px}
.wl-mhead .rn{flex:none;font-size:8px;font-weight:900;font-family:ui-monospace,Menlo,monospace;
  color:var(--dim);border:1px solid rgba(122,139,176,.35);border-radius:5px;padding:1px 5px}
.wl-mhead .sc{margin-left:auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;font-weight:900}
.wl-mhead.win .sc{color:#3dffa8;text-shadow:0 0 8px rgba(61,255,168,.5)}
.wl-mhead.lose .sc{color:#ff8ba3}
.wl-mhead .foe{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-mhead .foe i{font-style:normal;color:var(--pink);font-size:9px;letter-spacing:1px;margin:0 5px}
.wl-bye{margin-top:8px;font-size:10px;color:var(--gold);letter-spacing:1px;
  border:1px dashed rgba(255,215,0,.35);border-radius:9px;padding:7px 10px;text-align:center}
.wb-r{display:flex;align-items:baseline;gap:8px;margin-top:6px;font-size:10px;letter-spacing:.3px;line-height:1.5}
.wb-r .rn{flex:none;font-size:8px;font-weight:900;font-family:ui-monospace,Menlo,monospace;
  color:var(--dim);border:1px solid rgba(122,139,176,.35);border-radius:5px;padding:1px 5px}
.wb-r.w{color:#3dffa8}
.wb-r.l{color:#ff8ba3}
.wb-r .etag{flex:none;font-size:8px;font-weight:800;letter-spacing:1px;border-radius:4px;padding:0 4px;margin-left:2px}
.etag.adv{color:#3dffa8;border:1px solid rgba(61,255,168,.45)}
.etag.dis{color:#ffb3d1;border:1px solid rgba(255,42,141,.45)}
.etag.res{color:var(--gold);border:1px solid rgba(255,215,0,.45)}
.etag.bye{color:var(--dim);border:1px solid rgba(122,139,176,.4)}
.wb-r .cw{font-weight:800}
.wl-elim{margin-top:8px;font-size:9px;color:var(--dim);letter-spacing:1px;text-align:center}
.wl-elim b{color:var(--gold)}
/* 完整赛程（折叠） */
.bracket{margin-top:10px}
.bracket .br-tog{width:100%;background:rgba(0,240,255,.05);border:1px solid rgba(0,240,255,.18);color:var(--cyan);
  border-radius:10px;padding:8px 0;font-size:10px;letter-spacing:2px;cursor:pointer;font-weight:700}
.bracket .br-tog small{display:block;font-size:8px;color:var(--dim);margin-top:2px;letter-spacing:1px;font-weight:400}
.br-body{display:none;margin-top:8px}
.bracket.open .br-body{display:block}
.br-round{margin-top:8px}
.br-rn{font-size:9px;letter-spacing:2px;color:var(--cyan);font-weight:800;opacity:.85}
.wwm{margin-top:6px;background:rgba(3,6,14,.55);border:1px solid rgba(0,240,255,.12);border-radius:9px;
  padding:7px 10px;cursor:pointer}
.wwm .wl-mhead{font-size:10px}
.wwm .mrounds{display:none}
.wwm.open .mrounds{display:block}
.wwm .mwin{font-weight:900;color:#3dffa8}
.wwm .mlose{color:#7a8bb0}

/* 昨日榜 */
.y-head{scroll-snap-align:start;background:linear-gradient(120deg,rgba(255,215,0,.12),rgba(6,9,20,.94));
  border:1px solid rgba(255,215,0,.35);border-radius:12px;padding:12px;margin-bottom:10px}
.y-head .wt{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:800;display:flex;align-items:center;gap:7px}
.y-head .wt::before{content:"";width:7px;height:7px;background:var(--gold);box-shadow:0 0 8px var(--gold);transform:rotate(45deg)}
.y-head .wt .date{margin-left:auto;font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:400}
.y-seal{margin-top:7px;font-size:9px;color:var(--dim);letter-spacing:1px}
.y-reward{margin-top:10px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.28);border-radius:11px;padding:11px 12px}
.y-reward .t{font-size:11px;color:var(--gold);letter-spacing:1px;font-weight:800}
.y-reward .r{font-size:13px;font-weight:800;color:#fff;margin-top:3px}
.y-reward .ww-hint{color:var(--dim)}

/* 空态 / 骨架 */
.empty{text-align:center;padding:26px 20px;border:1px dashed rgba(0,240,255,.3);border-radius:14px;margin-bottom:10px;
  background:rgba(8,12,26,.6)}
.empty .ico{display:flex;justify-content:center;filter:drop-shadow(0 0 12px rgba(0,240,255,.45))}
.empty .p1{margin-top:8px;font-size:13px;color:var(--cyan);letter-spacing:2px}
.empty .p2{margin-top:5px;font-size:10px;color:var(--dim);line-height:1.8}
.skel{display:flex;gap:10px;align-items:center;padding:11px 12px;margin-bottom:8px;
  background:var(--panel);border-radius:12px;border:1px solid rgba(0,240,255,.06)}
.skel i{display:block;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.12),rgba(255,255,255,.05));
  background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{to{background-position:-200% 0}}
.board-foot{text-align:center;font-size:9px;color:#43507a;letter-spacing:1px;padding:6px 0 4px;line-height:1.9}
.board-foot .noreward{color:#5a6b94}

/* ─────────── 每日礼包悬浮卡 ─────────── */
.fab{position:fixed;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:40;
  width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,215,0,.55);cursor:pointer;
  background:radial-gradient(circle at 32% 28%,rgba(255,215,0,.28),rgba(10,14,29,.95) 65%);
  box-shadow:0 0 20px rgba(255,215,0,.35),0 8px 24px rgba(0,0,0,.5);
  font-size:23px;display:flex;align-items:center;justify-content:center;transition:.2s;
  animation:fabfloat 3s ease-in-out infinite}
.fab:active{transform:scale(.92)}
.fab .dot{position:absolute;top:2px;right:2px;width:11px;height:11px;border-radius:50%;
  background:var(--pink);box-shadow:0 0 8px var(--pink);border:2px solid var(--bg)}
@keyframes fabfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sheet-mask{position:fixed;inset:0;z-index:49;background:rgba(2,4,10,.6);backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:.25s}
.sheet-mask.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(105%);z-index:50;
  width:100%;max-width:536px;background:linear-gradient(180deg,#0d1226,#070a18);
  border:1px solid rgba(255,215,0,.35);border-bottom:none;border-radius:20px 20px 0 0;
  padding:16px 16px calc(18px + env(safe-area-inset-bottom));transition:transform .3s cubic-bezier(.2,.9,.3,1);
  box-shadow:0 -10px 40px rgba(0,0,0,.6),0 0 30px rgba(255,215,0,.12)}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet .grab{width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);margin:0 auto 12px}
.sheet h3{font-size:13px;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:8px}
.sheet h3::before{content:"";width:8px;height:8px;background:var(--gold);box-shadow:0 0 8px var(--gold);transform:rotate(45deg)}
.sheet h3 .cls{margin-left:auto;font-size:14px;color:var(--dim);cursor:pointer;border:none;background:none;padding:4px}
.gift-tier{display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.22);border-radius:12px;padding:11px 12px;margin-top:11px}
.gift-tier .t{font-size:11px;color:var(--gold);letter-spacing:1px}
.gift-tier .r{font-size:13px;font-weight:800;color:#fff;margin-top:3px}
.giftcode{margin-top:11px;display:none}
.giftcode .code{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--cyan);
  word-break:break-all;background:rgba(0,0,0,.5);border:1px dashed rgba(0,240,255,.4);
  border-radius:9px;padding:10px 11px;letter-spacing:.5px}
.giftcode .hint{font-size:9px;color:var(--dim);letter-spacing:.5px;line-height:1.6;margin-top:7px;text-align:center}
.gift-done{margin-top:10px;font-size:11px;color:#3dffa8;letter-spacing:.5px;display:none;line-height:1.7}
.gift-done .re{display:block;color:var(--dim);font-size:9px;margin-top:2px}
.gift-none{margin-top:11px;font-size:11px;color:var(--dim);text-align:center;padding:14px 10px;
  border:1px dashed rgba(122,139,176,.3);border-radius:10px;line-height:1.8}

/* Toast */

/* ═══════════════════════════════════════════════════════════════
   模块 3 · 种子随机（mulberry32 + FNV-1a；与 Worker 同实现）
   ═══════════════════════════════════════════════════════════════ */

  return h >>> 0;

  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let x = Math.imul(a ^ (a >>> 15), 1 | a);
    x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x;
    return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
  };
}

/* ═══════════════════════════════════════════════════════════════
   模块 4 · UTC+8 结算日键（每日 0 点 UTC+8 封存昨日榜）
   ═══════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════
   模块 6 · 上榜码 解析 + 验签（与 rankData.js verifyRankCode 同口径）
   NQCRANK-{base64url(JSON)}-{sig16}，sig16 = HMAC(secret,'NQCRANK'+payload)
   ═══════════════════════════════════════════════════════════════ */
function b64urlDecode(s) {

}
function verifyRankCode(raw) {

  if (!m) return { ok: false, error: 'format' };
  const payload = m[1], sig = m[2].toUpperCase();
  if (sign16('NQCRANK' + payload) !== sig) return { ok: false, error: 'signature' };
  let data;
  try { data = JSON.parse(b64urlDecode(payload)); } catch { return { ok: false, error: 'payload' }; }
  if (!data || data.v !== 1 || typeof data.name !== 'string' || !data.name
      || !Number.isFinite(data.power)) return { ok: false, error: 'payload' };
  const sid = data.slotId;
  data.slotId = (typeof sid === 'string' && sid) ? sid : 'SLOT-' + String(sid ?? '0');
  data.power = Math.max(0, Math.round(data.power));
  data.ts = Number.isFinite(data.ts) ? data.ts : 0; // 领奖新鲜度锚点
  data.party = Array.isArray(data.party) ? data.party.slice(0, 3).map(c => ({
    charId: String(c.charId || c.id || 'unknown'), name: String(c.name || '?'),
    level: +c.level || 1, stars: +c.stars || 1, power: +c.power || 0,
  })) : [];
  data.megaCount = +data.megaCount || 0; data.maxEnhance = +data.maxEnhance || 0;
  data.credits = +data.credits || 0; data.gems = +data.gems || 0;
  data.rank = +data.rank || 0; data.portraitCount = +data.portraitCount || 0;
  data.playerLevel = Math.max(0, Math.floor(+data.playerLevel || 0)); // 玩家等级（v6+，旧码无 → 0 = 不显示段位徽章）
  data.playerRank = Math.max(0, Math.floor(+data.playerRank || 0));   // RANK 段位序号 1-10（v6+，旧码无 → 0）
  data.abyssFloor = +data.abyssFloor || 0;
  data.caixiaoniao = data.caixiaoniao ? 1 : 0;
  data.worldWarWins = +data.worldWarWins || 0;
  // 佩戴称号（可选）：字符串 id 或 { id/name/nameZh/nameEn/effect/effectColor/tier }，原样透传
  if (data.title != null && typeof data.title !== 'string' && typeof data.title !== 'object') delete data.title;
  return { ok: true, data };
}

/* ═══════════════════════════════════════════════════════════════
   模块 6.5 · 称号解析与渲染（payload.title → TITLES_MAP；特效与游戏内一致）

    return { id: '', z: raw, j: raw, e: raw, fx: 'glow', c: '#00f0ff', tier: 1 };
  }
  if (typeof raw === 'object') {
    const base = (typeof raw.id === 'string' && TITLES_MAP[raw.id]) || null;
    const z = raw.nameZh || raw.z || (base && base.z) || (typeof raw.name === 'string' ? '' : '') || '';
    const j = raw.name || raw.j || (base && base.j) || z;
    const e = raw.nameEn || raw.e || (base && base.e) || j;
    const zz = z || j || e;
    if (!zz) return null;
    return {
      id: raw.id || (base && base.id) || '',
      z: zz, j: j || zz, e: e || zz,
      fx: raw.effect || raw.fx || (base && base.fx) || 'glow',

/* ═══════════════════════════════════════════════════════════════
   模块 7 · 世界大战 v3 引擎（与 rank-worker/worker.js 逐字一致）
   规则：昨日快照全员参赛 · ≥5 人开启 · 每轮随机两两配对单败淘汰（奇数轮空）
   每场 3v3：双方前 3 角色逐位对拼 —— 角色战力 ×(0.75+种子随机0.5)
   ×元素系数（克制1.30 / 逆克0.85 / 同元素共鸣1.05，与 elementData.js 同环）
   三局两胜；空位不战而败；拖平则队伍总战力决胜局。存活到最后为冠军。
   ═══════════════════════════════════════════════════════════════ */
const WW_ELEMENT_ORDER = ['quantum', 'blaze', 'frost', 'thunder', 'void', 'holy'];
/** 攻击方 a 对防守方 d 的元素系数（克制环：quantum→blaze→frost→thunder→void→holy→quantum） */
function wwElemRel(a, d) {
  if (!a || !d) return { mul: 1, tag: null };
  if (a === d) return { mul: 1.05, tag: 'resonance' }; // 同元素·共鸣彩蛋 +5%
  const ai = WW_ELEMENT_ORDER.indexOf(a), di = WW_ELEMENT_ORDER.indexOf(d);
  if (ai < 0 || di < 0) return { mul: 1, tag: null };
  if ((ai + 1) % 6 === di) return { mul: 1.30, tag: 'advantage' };    // 克制
  if ((di + 1) % 6 === ai) return { mul: 0.85, tag: 'disadvantage' }; // 逆克
  return { mul: 1, tag: null };
}
function wwCharSnap(c) {
  return { charId: String(c.charId || c.id || 'unknown'), name: String(c.name || '?'),
    level: +c.level || 1, stars: +c.stars || 1, power: +c.power || 0 };
}
/** 单场 3v3：返回 { winner:'a'|'b', score:[a胜局,b胜局], rounds:[逐回合记录] } */
function wwMatch(A, B, rng) {
  const rounds = [];
  let aw = 0, bw = 0;
  for (let i = 0; i < 3 && aw < 2 && bw < 2; i++) {
    const ca = (A.party || [])[i] || null, cb = (B.party || [])[i] || null;
    if (!ca && !cb) continue; // 双方空位 → 该局跳过
    if (!ca || !cb) { // 空位不战而败
      const win = ca ? 'a' : 'b';
      if (ca) aw++; else bw++;
      rounds.push({ an: ca ? ca.name : null, al: ca ? ca.level : 0, as: ca ? ca.stars : 0,
        ac: ca ? ca.charId : null, ap: ca ? ca.power : 0,
        bn: cb ? cb.name : null, bl: cb ? cb.level : 0, bs: cb ? cb.stars : 0,
        bc: cb ? cb.charId : null, bp: cb ? cb.power : 0, win, tag: 'bye' });
      continue;
    }
    const relA = wwElemRel(CHAR_ELEMENT[ca.charId], CHAR_ELEMENT[cb.charId]);
    const relB = wwElemRel(CHAR_ELEMENT[cb.charId], CHAR_ELEMENT[ca.charId]);
    const ea = (ca.power || 0) * (0.75 + rng() * 0.5) * relA.mul;
    const eb = (cb.power || 0) * (0.75 + rng() * 0.5) * relB.mul;
    const win = ea >= eb ? 'a' : 'b';
    if (win === 'a') aw++; else bw++;
    rounds.push({ an: ca.name, al: ca.level, as: ca.stars, ac: ca.charId, ap: ca.power,
      bn: cb.name, bl: cb.level, bs: cb.stars, bc: cb.charId, bp: cb.power,
      win, tag: relA.tag || relB.tag }); // tag 以 a 方视角记录
  }
  let winner;
  if (aw === bw) { // 空位拖平（罕见）→ 队伍总战力决胜局
    const sa = (A.party || []).reduce((s, c) => s + (c.power || 0), 0) || A.power || 1;
    const sb = (B.party || []).reduce((s, c) => s + (c.power || 0), 0) || B.power || 1;
    winner = sa * (0.75 + rng() * 0.5) >= sb * (0.75 + rng() * 0.5) ? 'a' : 'b';
    rounds.push({ tiebreak: true, win: winner, an: A.name, bn: B.name });

  return { winner, score: [aw, bw], rounds };
}
/**
 * 世界大战主模拟：entries = 昨日快照阵容（全员）。
 * <5 人 → { started:false, need }；否则完整单败淘汰 →
 * { started:true, v:3, date, total, champion, standings, matches, byes }
 * standings: [{slotId,name,rank,kills}]（kills=击败数=淘汰的玩家数）

function simulateWar3(dateKey, entries) {
  const roster = (entries || []).map(e => ({
    slotId: String(e.slotId), name: String(e.name || '?'), power: +e.power || 0,
    title: e.title ?? null,

  }));

  // 种子 = 日期 + 阵容指纹（快照已冻结 → 全设备同一战报）
  const fp = roster.map(r => r.slotId + ':' + r.power + ':' + r.party.map(c => c.charId + c.power).join(',')).join('|');
  const rng = mulberry32(hashStr('nqc_ww3_' + dateKey + '_' + fp));

  let alive = roster.slice();
  for (let i = alive.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const tmp = alive[i]; alive[i] = alive[j]; alive[j] = tmp; }
  const kills = {}; roster.forEach(r => { kills[r.slotId] = 0; });
  const pw = {}; roster.forEach(r => { pw[r.slotId] = r.power; });
  const matches = [], byes = [], placement = [];
  let round = 1;
  while (alive.length > 1) {
    const pool = alive.slice();
    let bye = null;
    if (pool.length % 2 === 1) {

      byes.push({ round, slotId: bye.slotId, name: bye.name });
    }
    const next = bye ? [bye] : [];
    for (let i = 0; i + 1 < pool.length; i += 2) {
      const A = pool[i], B = pool[i + 1];
      const m = wwMatch(A, B, rng);
      const W = m.winner === 'a' ? A : B, L = m.winner === 'a' ? B : A;
      kills[W.slotId]++;
      matches.push({ round, a: { slotId: A.slotId, name: A.name }, b: { slotId: B.slotId, name: B.name },
        winner: W.slotId, score: m.score, rounds: m.rounds });
      placement.push({ slotId: L.slotId, name: L.name, roundElim: round });
      next.push(W);
    }
    alive = next; // 下一轮重新随机匹配
    for (let i = alive.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const tmp = alive[i]; alive[i] = alive[j]; alive[j] = tmp; }
    round++;
  }
  const champion = alive[0];
  // 名次：冠军 #1；其余按淘汰轮次（晚淘汰靠前），同轮按战力降序
  const rest = placement.slice().sort((x, y) => y.roundElim - x.roundElim || pw[y.slotId] - pw[x.slotId]);
  const standings = [{ slotId: champion.slotId, name: champion.name, rank: 1, kills: kills[champion.slotId], roundElim: 0 }]
    .concat(rest.map((p, i) => ({ slotId: p.slotId, name: p.name, rank: i + 2, kills: kills[p.slotId], roundElim: p.roundElim })));
  return { v: 3, date: dateKey, total, started: true,
    champion: { slotId: champion.slotId, name: champion.name, kills: kills[champion.slotId] },
    standings, matches, byes };
}

/* ═══════════════════════════════════════════════════════════════
   模块 7.5 · 昨日榜 / 世界大战 数据聚合（Worker 优先，本机快照降级）
   ═══════════════════════════════════════════════════════════════ */
/** 昨日榜数据源：Worker 快照 > 本机每日首拉快照 > pending 空态 */
function ydayData() {
  if (YDAY && YDAY.entries && YDAY.entries.length) return { date: YDAY.date, entries: YDAY.entries, pending: false };
  const s = loadSnap();
  if (s && s.date === yesterdayKey8() && s.entries.length) return { date: s.date, entries: s.entries, pending: false };
  return { date: (YDAY && YDAY.date) || yesterdayKey8(), entries: [], pending: true };
}
/** 昨日大战战报：Worker v3 战报 > 同一昨日快照本地模拟（同算法同种子 → 同结果） */
function warReport() {
  if (WAR && WAR.v === 3) return WAR;
  const y = ydayData();
  if (y.entries.length) return simulateWar3(y.date, y.entries);
  return { v: 3, date: y.date, total: 0, started: false, pending: true, need: 5 };
}
/** 击败数小标映射：最近战报 slotId → kills */
function killsMap() {
  const w = warReport();
  const m = {};
  if (w.started && Array.isArray(w.standings)) w.standings.forEach(s => { m[s.slotId] = s.kills; });
  return m;
}

function toast(msg) {
  const el = $('#toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(el._tm); el._tm = setTimeout(() => el.classList.remove('show'), 2000);
}
function fmt(n) { return Number(n || 0).toLocaleString('en-US'); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function shortId(p) { return String(p.slotId).replace(/[^A-Za-z0-9]/g, '').slice(-4).toUpperCase(); }

/** 实时榜（纯真实数据：线上=全服榜；本地=本机上传） */
function liveList(sortMode) {
  const mySlots = new Set(Object.keys(loadEntries()));
  let all;
  if (ONLINE && REAL_OK) {
    all = REAL.map(e => ({ ...e, me: mySlots.has(e.slotId) }));
  } else {
    all = Object.values(loadEntries()).map(e => ({ ...e, me: true }));
  }
  const cnt = {};
  all.forEach(p => { cnt[p.name] = (cnt[p.name] || 0) + 1; });
  all.forEach(p => { p.dup = cnt[p.name] > 1; });
  const key = sortMode === 'boss' ? p => p.abyssFloor : p => p.power;
  all.sort((a, b) => key(b) - key(a) || (b.power - a.power));
  all.forEach((p, i) => { p._rank = i + 1; });
  return all;
}

/* ─── 昨日榜（每日 0 点 UTC+8 结算封存 · 昨日数据不变） ─── */
function ydayRewardFor(slotId) {
  const y = ydayData();
  if (!y.entries.length) return null;
  const sorted = y.entries.slice().sort((a, b) => (b.power || 0) - (a.power || 0));
  const idx = sorted.findIndex(e => e.slotId === slotId);
  if (idx < 0 || idx > 2) return null;
  const rank = idx + 1;
  const type = rank === 1 ? 'RANK_D1' : 'RANK_D3';
  const tier = GIFT_TIERS.find(x => x.type === type);
  const mine = loadEntries()[slotId] || {};
  const realRow = REAL.find(e => e.slotId === slotId) || {};
  const lastTs = realRow.lastTs || mine.lastTs || mine.ts || 0;
  const anchor = Math.max(lastTs + 60000, settleAnchorMs(y.date)); // ts 链：晚于任何已领奖码
  const payload = '00' + encodeRankUploadTs(anchor);
  return { rank, type, tier, code: `NQC-${type}-${payload}-${sign16(type + '-' + payload)}` };
}
function ydayBoardHtml() {

  if (mineBest) {

/* ─── 世界大战（昨日快照全员 · 3v3 单败淘汰 · ≥5 人开启） ─── */

  return `NQC-RANK_WW-${payload}-${sign16('RANK_WW-' + payload)}`;
}

function warRoundLineHtml(r, i, focusSide) {

  const aWin = r.win === 'a';

  const lLabel = t('wwChar')(aWin ? r.bn : r.an, aWin ? r.bs : r.as, aWin ? r.bl : r.al);
  let tag = '';
  if (r.tag === 'resonance') tag = `<span class="etag res">${t('tagRes')}</span>`;

/** 玩家完整对战记录（点击参赛者卡片展开）：每场对手 + 逐回合 + 轮空 + 最终名次 */

  const maxRound = (war.matches || []).reduce((s, m) => Math.max(s, m.round), 0);
  let body = '';
  for (let r = 1; r <= maxRound; r++) {
    body += `<div class="br-round"><div class="br-rn">${r === maxRound ? t('wwFinal') : t('wwRound')(r)}</div>`;
    (war.byes || []).filter(b => b.round === r).forEach(b => {
      body += `<div class="wl-bye">${esc(b.name)} · ${t('wwBye')}</div>`;
    });
    (war.matches || []).filter(m => m.round === r).forEach(m => {
      const mid = m.round + ':' + m.a.slotId + ':' + m.b.slotId;
      const aWin = m.winner === m.a.slotId;
      body += `<div class="wwm ${WOPEN.has(mid) ? 'open' : ''}" data-mid="${esc(mid)}">
        <div class="wl-mhead">
          <span class="foe"><span class="${aWin ? 'mwin' : 'mlose'}">${esc(m.a.name)}</span> <i>VS</i> <span class="${aWin ? 'mlose' : 'mwin'}">${esc(m.b.name)}</span></span>
          <span class="sc ${aWin ? '' : ''}">${m.score[0]}:${m.score[1]}</span></div>
        <div class="mrounds">${m.rounds.map((rr, i) => warRoundLineHtml(rr, i, null)).join('')}</div>
      </div>`;
    });
    body += '</div>';
  }
  return `<div class="bracket ${BR_OPEN ? 'open' : ''}">
    <button class="br-tog" id="brTog">${t('wwBracket')} (${(war.matches || []).length})<small>${t('wwBracketSub')}</small></button>
    <div class="br-body">${body}</div>
  </div>`;
}
/** 世界大战 Tab 完整视图：战报卡 + 参赛者榜（按大战名次，主显击败数）+ 完整赛程 */
function wwBoardHtml() {
  const war = warReport();
  const mySlots = new Set(Object.keys(loadEntries()));
  let html = wwReportCardHtml(war, mySlots);
  if (war.started) {
    const y = ydayData();
    const entOf = sid => y.entries.find(e => e.slotId === sid) || { slotId: sid, name: (war.standings.find(s => s.slotId === sid) || {}).name || '?', power: 0, party: [] };
    const cnt = {};
    war.standings.forEach(s => { cnt[s.name] = (cnt[s.name] || 0) + 1; });
    html += war.standings.map(s => {
      const ent = entOf(s.slotId);
      const p = { ...ent, name: s.name, _rank: s.rank, me: mySlots.has(s.slotId), dup: cnt[s.name] > 1 };
      const card = cardHtml(p, { metric: 'kills', killsMap: { [s.slotId]: s.kills } });
      return card + (OPEN_KEY === s.slotId ? warPlayerLogHtml(war, s.slotId) : '');
    }).join('');
    html += bracketHtml(war);
  }
  return html;
}

/* ─── 主榜渲染（按 Tab 分发） ─── */
function renderBoard() {
  const board = $('#board');
  board.innerHTML = Array.from({ length: 8 }, () =>
    `<div class="skel"><i style="width:36px;height:36px"></i>
     <div style="flex:1"><i style="width:55%;height:12px"></i><i style="width:35%;height:9px;margin-top:6px"></i></div>
     <i style="width:60px;height:18px"></i></div>`).join('');
  setTimeout(() => {
    let html = '';
    if (CUR_TAB === 'ww') html = wwBoardHtml();
    else if (CUR_TAB === 'yday') html = ydayBoardHtml();
    else html = liveBoardHtml();
    board.innerHTML = html;
  }, 200);
}

/* ─── 英雄区：我的卡片 ─── */
function myBestEntry() { // 最新上传的存档作为"我"
  const all = Object.values(loadEntries());
  if (!all.length) return null;
  return all.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))[0];
}
function myOverallRank(slotId) { // 总榜名次（礼包档位锚定总榜）
  const me = liveList('power').find(p => p.me && p.slotId === slotId);
  return me ? me._rank : null;
}
function isTsClaimed(slotId, ts) {
  const c = loadClaimed()[slotId] || [];
  return c.some(r => r.ts === ts);
}
function renderMe() {
  const me = myBestEntry();
  const el = $('#meCard');
  if (!me) { el.className = 'me empty'; el.innerHTML = `<div>${t('meEmpty')}</div>`; return; }
  const rank = myOverallRank(me.slotId);
  const fresh = me.ts > 0 && !isTsClaimed(me.slotId, me.ts);
  const kills = killsMap()[me.slotId] || 0;
  el.className = 'me';
  el.innerHTML = `
    <div class="medal"><div class="r">${rank ? '#' + rank : '—'}</div><div class="k">${t('meRank')}</div></div>
    <div class="meinfo">
      <div class="menm">${esc(me.name)}${rankBadgeHtml(me)}</div>
      <div class="memeta">${t('mePower')} <b>${fmt(me.power)}</b> · ${t('meFloor')} <b>${me.abyssFloor}F</b> · ${t('meKills')} <b>${kills}</b></div>
    </div>
    <div class="mestate ${fresh ? 'can' : 'done'}">${fresh ? '● ' + t('canClaim') : t('claimed')}</div>`;
}

/* ═══════════════════════════════════════════════════════════════
   模块 8.5 · 每日礼包（领奖新鲜度：每次上传 ts 只能领一次；大按钮回传）
   ═══════════════════════════════════════════════════════════════ */
function giftTierOf(rank) { return GIFT_TIERS.find(x => rank <= x.maxRank); }
function genGiftCode(type) {
  const payload = '00' + encodeRankUploadTs(Date.now());
  return `NQC-${type}-${payload}-${sign16(type + '-' + payload)}`;
}
function bigCopyBtnHtml(code, copiedMsg) {
  return `<button class="btn-xl" data-copy="${code}" data-copied="${copiedMsg || t('giftCopied')}">
    ${t('giftCopyBig')}<span class="xl-sub">${t('giftCopySub')}</span></button>`;
}
function renderGift() {
  const body = $('#giftBody');
  const me = myBestEntry();
  if (!me) {
    body.innerHTML = `<div class="gift-none">${t('giftNone')}</div><div class="gift-note">${t('giftNote')}</div>`;
    $('#giftDot').style.display = 'none';
    return;
  }
  const rank = myOverallRank(me.slotId) || 9999;
  const tier = giftTierOf(rank);
  const claimedList = loadClaimed()[me.slotId] || [];
  const rec = claimedList.find(r => r.ts === me.ts);
  $('#giftDot').style.display = (!rec && me.ts > 0) ? '' : 'none';
  if (rec) { // 本次 ts 已领 → 锁定，展示码 + 大按钮回传，提示再次上传
    body.innerHTML = `
      <div class="gift-tier"><div>
        <div class="t">${t('giftTier')(rank)} · ${t('tierName')[tier.type]}</div>
        <div class="r">${t('giftReward')(tier)}</div>
      </div></div>
      <div class="giftcode" style="display:${rec.code ? 'block' : 'none'}">
        <div class="code">${rec.code}</div>
        <div class="ww-act">${bigCopyBtnHtml(rec.code)}</div>
        <div class="hint">${t('giftHint')}</div>
      </div>
      <div class="gift-done" style="display:block">${t('giftDone')}<span class="re">${t('giftReupload')}</span></div>
      <div class="gift-note">${t('giftNote')}</div>`;
    return;
  }
  body.innerHTML = `
    <div class="gift-tier"><div>
      <div class="t">${t('giftTier')(rank)} · ${t('tierName')[tier.type]}</div>
      <div class="r">${t('giftReward')(tier)}</div>
    </div>
    <button class="btn pink" id="giftBtn" style="height:38px">${t('giftClaimBtn')}</button></div>
    <div class="gift-note">${t('giftNote')}</div>`;
  $('#giftBtn').addEventListener('click', async () => {
    if (ONLINE) { // 线上模式：服务器按全服名次签发奖励码（同一上传 ts 仅可领一次）
      $('#giftBtn').disabled = true;
      try {
        const j = await apiGet('/reward?slot=' + encodeURIComponent(me.slotId));
        const all = loadClaimed();
        (all[me.slotId] = all[me.slotId] || []).push({ ts: me.ts, code: j.code });
        saveClaimed(all);
        renderGift(); renderMe();
        toast(t('giftGenOk'));
      } catch (e) {
        if (e.message === 'http_409') { // 服务器判定已领 → 重绘为已领视图
          const all = loadClaimed();
          if (!(all[me.slotId] || []).some(r => r.ts === me.ts)) {
            (all[me.slotId] = all[me.slotId] || []).push({ ts: me.ts, code: '' });
            saveClaimed(all);
          }
          renderGift(); renderMe();
        } else { toast(t('netErr')); $('#giftBtn').disabled = false; }
      }
      return;
    }
    const code = genGiftCode(tier.type);
    const all = loadClaimed();
    (all[me.slotId] = all[me.slotId] || []).push({ ts: me.ts, code }); // 登记本次 ts
    saveClaimed(all);
    renderGift(); renderMe();
    toast(t('giftGenOk'));
  });
}
async function copyText(text, msg) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  toast(msg || t('giftCopied'));
}

/* ═══════════════════════════════════════════════════════════════
   模块 9 · i18n 应用 + 语言切换
   ═══════════════════════════════════════════════════════════════ */
function applyI18n() {
  document.documentElement.lang = LANG === 'zh' ? 'zh-CN' : LANG === 'ja' ? 'ja' : 'en';
  $('#uiTitle').textContent = t('title');
  $('#uiSub').textContent = t('sub');
  $('#uiLive').textContent = ONLINE ? t('liveOnline') : t('live');
  $('#codeInput').placeholder = t('codePh');
  $('#codeBtn').textContent = t('codeBtn');
  $('#uiGiftTitle').textContent = t('giftTitle');
  document.querySelector('[data-tt="tabPower"]').textContent = t('tabPower');
  document.querySelector('[data-tt="tabBoss"]').textContent = t('tabBoss');
  document.querySelector('[data-tt="tabYday"]').textContent = t('tabYday');
  document.querySelector('[data-tt="tabWw"]').textContent = t('tabWw');
  document.title = t('title') + ' · STAR ROAD RANKING';
  document.querySelectorAll('#langBox button').forEach(b => b.classList.toggle('on', b.dataset.lang === LANG));
}
$('#langBox').addEventListener('click', e => {
  const b = e.target.closest('button[data-lang]');
  if (!b || b.dataset.lang === LANG) return;
  LANG = b.dataset.lang;
  try { localStorage.setItem(LS_LANG, LANG); } catch {}
  applyI18n(); renderMe(); renderGift(); renderBoard();
});

/* ═══════════════════════════════════════════════════════════════
   模块 10 · 事件
   ═══════════════════════════════════════════════════════════════ */
$('#board').addEventListener('click', e => {
  // 复制按钮 / 码块（一键复制回游戏）
  const cp = e.target.closest('[data-copy]');
  if (cp) { e.stopPropagation(); copyText(cp.dataset.copy, cp.dataset.copied || t('giftCopied')); return; }
  // 完整赛程折叠
  const tog = e.target.closest('#brTog');
  if (tog) { BR_OPEN = !BR_OPEN; renderBoard(); return; }
  // 赛程单场展开逐回合
  const wwm = e.target.closest('.wwm');
  if (wwm) {
    const mid = wwm.dataset.mid;
    if (WOPEN.has(mid)) WOPEN.delete(mid); else WOPEN.add(mid);
    wwm.classList.toggle('open');
    const rounds = wwm.querySelector('.mrounds');
    if (rounds) rounds.style.display = wwm.classList.contains('open') ? 'block' : 'none';
    return;
  }
  // 卡片展开（普通榜=详情 / 大战=玩家对战记录 / 昨日榜=快照详情）
  const card = e.target.closest('.card');
  if (!card) return;
  const key = card.dataset.key;
  OPEN_KEY = (OPEN_KEY === key) ? null : key;
  renderBoard();
});
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    CUR_TAB = btn.dataset.tab;
    OPEN_KEY = null;
    renderBoard();
  });
});
/* 量子同步 loading 开关 */
function qload(show) {
  const el = $('#qload');
  if (show) { $('#qloadTxt').textContent = t('uploading'); el.classList.add('show'); }
  else el.classList.remove('show');
}
$('#codeBtn').addEventListener('click', async () => {
  const msg = $('#codeMsg');
  const raw = $('#codeInput').value;
  const v = verifyRankCode(raw);
  if (!v.ok) {
    msg.className = 'codemsg err';
    msg.textContent = v.error === 'signature' ? t('codeErrSig')
      : v.error === 'payload' ? t('codeErrPayload') : t('codeErrFormat');
    return;
  }
  if (ONLINE) { // 线上模式：先 POST 到 Worker，验签+新鲜度由服务器裁决
    msg.className = 'codemsg'; msg.textContent = '…';
    qload(true);
    try {
      const code = String(raw || '').trim().replace(/\s+/g, '');
      const j = await apiPost('/rank', { code });
      const entries = loadEntries(); // 本地也存一份：标识"我" + 领奖 ts 锚点
      entries[v.data.slotId] = { ...v.data, savedAt: Date.now() };
      saveEntries(entries);
      await refreshReal(); await refreshWar(); await refreshYday();
      msg.className = 'codemsg ok';
      msg.textContent = `${t('codeOkOnline')(v.data.name)} · #${j.rank}`;
      toast(t('uploadDone'));
    } catch (e) {
      qload(false);
      msg.className = 'codemsg err';
      msg.textContent = (e.message === 'stale' || e.message === 'future') ? t('codeErrStale')
        : e.message === 'signature' ? t('codeErrSig') : t('netErr');
      return;
    }
    qload(false);
  } else { // 本地模式：仅存本机（短暂 loading 给明确反馈）
    qload(true);
    const entries = loadEntries();
    entries[v.data.slotId] = { ...v.data, savedAt: Date.now() };
    saveEntries(entries);
    maybeSnapLocal(Object.values(entries));
    await new Promise(r => setTimeout(r, 650));
    qload(false);
    msg.className = 'codemsg ok';
    msg.textContent = t('codeOk')(v.data.name);
    toast(t('uploadDone'));
  }
  $('#codeInput').value = '';
  OPEN_KEY = v.data.slotId; // 自动展开"我"的条目，明确看到已上榜
  renderMe(); renderGift(); renderBoard();
});
/* 礼包悬浮卡开合 */
const sheet = $('#giftSheet'), mask = $('#sheetMask');
function openSheet() { renderGift(); sheet.classList.add('open'); mask.classList.add('open'); }
function closeSheet() { sheet.classList.remove('open'); mask.classList.remove('open'); }
$('#giftFab').addEventListener('click', openSheet);
$('#sheetClose').addEventListener('click', closeSheet);
mask.addEventListener('click', closeSheet);

/* ═══════════════════════════════════════════════════════════════
   启动
   ═══════════════════════════════════════════════════════════════ */
(function init() {
  // 英雄区底图：ART_HERO → 回退立绘 → 纯渐变
  const art = $('#heroArt');
  const probe = new Image();
  probe.onload = () => { art.style.backgroundImage = `url("${ART_HERO}")`; };
  probe.onerror = () => {
    const p2 = new Image();
    p2.onload = () => { art.style.backgroundImage = `url("${ART_HERO_FALLBACK}")`; };
    p2.onerror = () => { art.style.background = 'radial-gradient(80% 100% at 50% 0%,#17204a,#04060e)'; };
    p2.src = ART_HERO_FALLBACK;
  };
  probe.src = ART_HERO;
  applyI18n(); renderMe(); renderGift(); renderBoard();
  if (ONLINE) { // 线上模式：拉全服实时榜 + 昨日榜快照 + 昨日大战战报后重绘
    refreshReal().then(() => { renderMe(); renderGift(); renderBoard(); if (!REAL_OK) showOfflineTip(); });
    refreshYday().then(() => { if (CUR_TAB === 'yday' || CUR_TAB === 'ww') renderBoard(); });
    refreshWar().then(() => { renderMe(); if (CUR_TAB === 'ww') renderBoard(); else if (CUR_TAB !== 'yday') renderBoard(); });
  } else {
    maybeSnapLocal(Object.values(loadEntries()));
  }
})();

/** 离线提示：仅当实时榜接口真正失败时弹出（v7 · 失败才弹，可重试） */
function showOfflineTip() {
  if (document.getElementById('offlineTip')) return;
  const d = document.createElement('div');
  d.id = 'offlineTip';
  d.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(5,8,20,.82);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)';
  d.innerHTML = '<div style="max-width:320px;text-align:center;padding:22px;border:1px solid rgba(0,240,255,.35);border-radius:16px;background:#0b1020;box-shadow:0 0 30px rgba(0,240,255,.15)"><div style="font-size:15px;font-weight:800;color:#00f0ff;margin-bottom:10px">' + esc(t('offlineTitle')) + '</div><div style="font-size:12px;color:#9db2d0;line-height:1.8">' + esc(t('offlineBody')) + '</div><button onclick="location.reload()" style="margin-top:14px;padding:8px 22px;border-radius:999px;border:1px solid rgba(0,240,255,.5);background:rgba(0,240,255,.12);color:#00f0ff;font-weight:700;cursor:pointer">' + esc(t('offlineRetry')) + '</button></div>';
  document.body.appendChild(d);
}
</script>
